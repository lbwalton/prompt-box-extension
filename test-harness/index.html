<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prompt Box — Popup Test Harness</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #e8e8ec; }
    #hud { padding: 8px 16px; font-size: 12px; color: #444; display: flex; gap: 16px; align-items: center; }
    #hud strong { color: #111; }
    #hud a { color: #0b6; text-decoration: none; }
    #hud a.active { font-weight: 700; text-decoration: underline; }
    #frameWrap { display: flex; justify-content: center; padding: 12px; }
    iframe { border: 0; width: 420px; height: 640px; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.18); border-radius: 8px; }
    #err { color: #b00; padding: 8px 16px; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Prompt Box harness</strong>
    <span>mode:</span>
    <a href="?mode=local" data-mode="local">local</a>
    <a href="?mode=sync" data-mode="sync">sync</a>
    <a href="?mode=cloud" data-mode="cloud">cloud</a>
    <span style="margin-left:auto">dev-only — never shipped</span>
  </div>
  <div id="err"></div>
  <div id="frameWrap"><iframe id="popupFrame" title="Prompt Box popup under test"></iframe></div>
  <script src="loader.js"></script>
</body>
</html>
