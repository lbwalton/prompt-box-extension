<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Icon Preview</title>
<style>
  body { background: #1a1a1a; display: flex; gap: 32px; align-items: flex-end; padding: 40px; font-family: sans-serif; color: #fff; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  label { font-size: 12px; color: #888; }
  /* Simulated toolbar strip */
  .toolbar { background: #3c3c3c; border-radius: 4px; padding: 6px; display: flex; align-items: center; }
</style>
</head>
<body>
  <div class="item">
    <div class="toolbar"><img src="icon.svg" width="16" height="16"></div>
    <label>16px (toolbar)</label>
  </div>
  <div class="item">
    <img src="icon.svg" width="48" height="48">
    <label>48px (extensions page)</label>
  </div>
  <div class="item">
    <img src="icon.svg" width="128" height="128">
    <label>128px (web store)</label>
  </div>
</body>
</html>
